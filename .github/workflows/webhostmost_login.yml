name: WebHostMost Login  

on:
  schedule:
    # 每月20号的 UTC 时间 00:00 运行
    - cron: '0 0 5/25 * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  login:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install puppeteer@latest

      - name: Run login script
        env:
          USERNAME_AND_PASSWORD: ${{ secrets.USERNAME_AND_PASSWORD }}
        run: node scripts/login.js

       - name: 保活提交（不修改 workflow）
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          # 创建/更新一个保活记录文件
          cat > .keepalive << EOF
          last_run: $(date -u +%Y-%m-%d_%H:%M:%S)_UTC
          next_cron: $(grep -oP "(?<=- cron: ')[^']+" .github/workflows/falix.yml)
          EOF
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .keepalive
          git commit -m "🚀 auto: 保活 $(date -u +%Y-%m-%d)" || echo "无变更"
          
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push
